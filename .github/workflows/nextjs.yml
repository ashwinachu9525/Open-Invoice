name: CI Build & Test Verification

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    name: Verify Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Configure Test Database (SQLite)
        run: npm run db:configure:sqlite

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: "file:./data/dev.db"
          AUTH_SECRET: "dummy-secret-for-ci-build-verification-1234567"
          NEXTAUTH_URL: "http://localhost:3000"
          GEMINI_API_KEY: "dummy"
          RAZORPAY_KEY_ID: "dummy"
          RAZORPAY_KEY_SECRET: "dummy"
          AES_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"

      - name: Run Tests
        run: npm run test
        env:
          DATABASE_URL: "file:./data/dev.db"
